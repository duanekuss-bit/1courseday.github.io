<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifeboat Command Center</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel (to run React code directly in the browser) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- FIREBASE CONFIGURATION ---
        // Replace the empty strings with your actual config from the Firebase Console
        npm install firebase
         // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCNrY34pRb92F5p7PrqP7d-He-oDUbjd40",
  authDomain: "lifeboat-blueprint.firebaseapp.com",
  projectId: "lifeboat-blueprint",
  storageBucket: "lifeboat-blueprint.firebasestorage.app",
  messagingSenderId: "1093280288322",
  appId: "1:1093280288322:web:f33d22f6ed776d9aa7a7db",
  measurementId: "G-2GF7EJSGJE"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

        // Note: For this to work in a browser without a build step, 
        // we'd typically use a Firebase CDN, but since you are using GitHub Pages,
        // we will focus on the UI and the AI Mentor (Gemini).
        
        const API_KEY = ""; // Provided at runtime by the environment
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;

        // --- COMPONENTS ---
        const Icon = ({ name, className }) => {
            const [iconSvg, setIconSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) setIconSvg(icon.toSvg());
                }
            }, [name]);
            return <span className={className} dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('lookout');
            const [chatHistory, setChatHistory] = useState([]);
            const [inputMessage, setInputMessage] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [visionIdx, setVisionIdx] = useState(0);
            
            const visions = [
                "\"The water in the creek is clear. Your 2026 choices became our clean glass today.\"",
                "\"The Mother Tree you planted in the transition is now our town's center.\"",
                "\"The social trust you built when the lights flickered is the chassis we still ride on.\"",
                "\"We found your letters. We are the seventh generation, and we are still here.\""
            ];

            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [chatHistory, isTyping]);

            useEffect(() => {
                const interval = setInterval(() => {
                    setVisionIdx((prev) => (prev + 1) % visions.length);
                }, 8000);
                return () => clearInterval(interval);
            }, []);

            const callGemini = async (userMsg) => {
                setIsTyping(true);
                const systemPrompt = "You are 'The Lookout,' an AI mentor from Duane Kuss's 'The Lifeboat Blueprint.' Be grounded, urgent, and use maritime metaphors.";
                const payload = {
                    contents: [{ parts: [{ text: userMsg }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    setChatHistory(prev => [...prev, { role: 'assistant', content: text }]);
                } catch (error) {
                    setChatHistory(prev => [...prev, { role: 'assistant', content: "Signal lost. Try again, crew." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!inputMessage.trim()) return;
                const msg = inputMessage;
                setInputMessage("");
                setChatHistory(prev => [...prev, { role: 'user', content: msg }]);
                callGemini(msg);
            };

            return (
                <div className="min-h-screen text-slate-100 p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-800 pb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-sky-400">Lifeboat Command Center</h1>
                                <p className="text-xs text-slate-500 mono uppercase tracking-widest mt-1">April 2026 | System Active</p>
                            </div>
                            <div className="flex gap-2 mt-4 md:mt-0">
                                {['lookout', 'engine-room', 'challenge'].map(t => (
                                    <button 
                                        key={t}
                                        onClick={() => setActiveTab(t)}
                                        className={`px-4 py-2 rounded text-xs font-bold uppercase border ${activeTab === t ? 'bg-sky-600 border-sky-500' : 'bg-slate-900 border-slate-800 text-slate-400'}`}
                                    >
                                        {t.replace('-', ' ')}
                                    </button>
                                ))}
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-8">
                                {activeTab === 'lookout' ? (
                                    <div className="bg-slate-900 border border-slate-800 rounded-2xl h-[600px] flex flex-col shadow-2xl">
                                        <div className="p-4 border-b border-slate-800 bg-slate-900/50 flex items-center gap-3">
                                            <div className="w-8 h-8 rounded-full bg-sky-500/20 flex items-center justify-center border border-sky-500/30">
                                                <div className="w-4 h-4 text-sky-400">⚓</div>
                                            </div>
                                            <span className="font-bold text-sm">The Lookout</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                            {chatHistory.length === 0 && (
                                                <div className="text-center py-20 opacity-40">
                                                    <p className="text-sm italic">"The ice is close. What's your report from the local watershed?"</p>
                                                </div>
                                            )}
                                            {chatHistory.map((m, i) => (
                                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                    <div className={`max-w-[85%] p-4 rounded-2xl text-sm ${m.role === 'user' ? 'bg-sky-600' : 'bg-slate-800 border border-slate-700'}`}>
                                                        {m.content}
                                                    </div>
                                                </div>
                                            ))}
                                            {isTyping && <div className="text-[10px] text-sky-400 animate-pulse font-mono">LOOKOUT IS ANALYZING...</div>}
                                            <div ref={chatEndRef} />
                                        </div>
                                        <form onSubmit={handleSubmit} className="p-4 border-t border-slate-800 bg-slate-900/50">
                                            <input 
                                                className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/50"
                                                placeholder="Send a message to the Lookout..."
                                                value={inputMessage}
                                                onChange={e => setInputMessage(e.target.value)}
                                            />
                                        </form>
                                    </div>
                                ) : (
                                    <div className="bg-slate-900 p-8 rounded-2xl border border-slate-800 text-center py-20">
                                        <p className="text-slate-500 italic">Gauges and Challenges are initializing in the Engine Room...</p>
                                    </div>
                                )}
                            </div>

                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl relative overflow-hidden">
                                    <h4 className="text-[10px] font-mono uppercase tracking-widest text-slate-500 mb-4">Transmission 2126</h4>
                                    <p className="text-sm italic text-slate-300 transition-all duration-1000">
                                        {visions[visionIdx]}
                                    </p>
                                </div>
                                <div className="bg-sky-600 p-6 rounded-2xl shadow-lg">
                                    <h4 className="font-bold text-white mb-1">Start the Transition</h4>
                                    <p className="text-xs text-sky-100 mb-4">Complete your first 9 by 21 task today.</p>
                                    <button className="w-full bg-white text-sky-600 py-2 rounded-xl text-xs font-bold uppercase tracking-widest">Open Ship's Log</button>
                                </div>
                            </div>
                        </div>
                        
                        <footer className="mt-12 text-center text-slate-600 text-[10px] font-mono uppercase tracking-[0.2em]">
                            <p>© 2026 Lifeboat Blueprint | The shop is open.</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
